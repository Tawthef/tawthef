[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888


[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Tell Netlify secrets scanner to ignore these intentionally public Supabase keys
  # These are SAFE to expose - anon key is designed for client-side use
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

# SPA redirects - route all requests to index.html for client-side routing
[[redirects]]
  from = "/api/ai/generate-summary"
  to = "/.netlify/functions/generate-summary"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

